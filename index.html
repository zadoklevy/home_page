<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף עם תמונת רקע</title>
    <style>
        /* הגדרות עבור ה-body (גוף הדף) */
        body {
            /* 1. הכתובת של התמונה */
            /* החלף את 'background.jpg' בשם הקובץ של התמונה שלך */
            background-image: url('background.jpg');
            /* background-repeat: no-repeat; */
    /* background-size: cover; */
    /* background-position: center; */
    
    /* שנה את fixed ל-scroll או פשוט מחק את השורה הזו */
    background-attachment: scroll; 

    /* margin: 0; */
    /* padding: 0; */
    /* כדי שיהיה לך בכלל לאן לגלול, נוסיף גובה מינימלי גדול */
    min-height: 200vh;

            /* 2. הגדרות כדי שהתמונה תיראה טוב */
            background-repeat: no-repeat;  /* אל תחזור על התמונה */
            background-size: cover;      /* תמתח את התמונה כדי שתכסה את כל המסך */
            background-position: center;  /* מרכז את התמונה */ 
           /* background-attachment: fixed; /* שהרקע יישאר קבוע כשגוללים */

            /* הגדרות נוספות כדי שהטקסט ייראה טוב */
            margin: 0%;
            padding: 20%;
            /*height: 100vh; /* גובה מלא של המסך */
            display: flex;
            justify-content: center; /* מרכוז אופקי של התוכן */
            align-items: center;     /* מרכוז אנכי של התוכן */
            font-family: Arial, sans-serif;
        }

        /* הגדרות עבור תיבת התוכן */
        .content-box {
            background-color: rgba(255, 255, 255, 0.8); /* רקע לבן חצי שקוף */
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        /* --- כאן מתחילה הרספונסיביות (התאמה לנייד) --- */
        @media (max-width: 768px) {
            body {
                /* בנייד לפעמים עדיף שהתמונה תהיה קבועה או תתאים את עצמה אחרת */
                background-attachment: scroll;
                padding-top: 30px;
                 min-height: 0vh;
                 background-position:revert;
                margin-bottom: auto;
            }

            .content-box {
                width: 85%; /* בנייד התיבה תתפוס כמעט את כל רוחב המסך */
                padding: 20px;
                margin-bottom: 50px; /* רווח בתחתית כדי שלא ייצמד לקצה */
            }

            h1 {
                font-size: 1.5rem; /* הקטנת הכותרת שתתאים למסך קטן */
            }
        }
    </style>
</head>
<body>
    <div class="content-box">
        <h1>ברוכים הבאים לאתר שלי!</h1>
        <p>זהו דף HTML פשוט עם תמונת רקע שמכסה את כל המסך.</p>
    </div>
</body>
</html>
