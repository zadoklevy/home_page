<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פתרון סופי לרקע</title>
    <style>
        /* איפוס מוחלט */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* מסירים הגדרות גובה קבועות כדי שהתמונה תקבע את הגובה */
        }

        .wrapper {
            position: relative;
            width: 100%;
            /* מניעת שוליים לבנים בתחתית */
            line-height: 0; 
        }

        .bg-image {
            width: 100%;
            height: auto;
            display: block;
            /* התמונה היא זו שיוצרת את הגובה של הדף */
        }

        .content-overlay {
            /* הצבת התוכן מעל התמונה */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* החזרת ה-line-height לטקסט */
            line-height: normal; 
            padding-top: 50px;
        }

        /* .content-box {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 25px;
            margin: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 450px;
        } */
        .contact-box{
             background: white;
            padding: 20px;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: absolute;
            bottom: 10%;
            left: 45%;
            
        }

        .contact-box h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .contact-box input,
        .contact-box textarea{
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            max-inline-size: -webkit-fill-available;
        }

        .contact-box button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact-box button:hover {
            background: #0056b3;
        }    
        
         @media (max-width: 750px) {
        .content {
            flex-direction: column;
            text-align: center;
        }
        .bg-image{
            height: 100vh;  
        }
        /* aply */
        .contact-box{
            width: 40%;           /* קטן */
            height: 20%;
            padding: 10px;
            right: 10px;
            bottom: 9%;
            border-radius: 10px;
            padding-bottom: 4%;
        }
        .contact-box h2{
            font-size: 14px;
            margin-bottom: 6px;
            margin-top: auto;
        }
        .contact-box input,
        .contact-box textarea {
            font-size: 12px;
            padding: 6px;
            margin-bottom: 6px;
        }
        .name {
            display: none;          /* מסתיר הודעה – קומפקטי */
        }
        .contact-box button{
            font-size: 13px;
            padding: 8px;
        }
        /* .contact-box{
            width: 40%;
            height: 20%;
            padding: 10px;
        } */
        .form {
            width: 100%;
        }
    }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="background.jpeg" alt="background" class="bg-image">

        <div class="content-overlay">
            <!-- <div class="content-box">
                <h1>זה יעבוד!</h1>
                <p>הדף נגמר בדיוק איפה שהתמונה נגמרת.</p>
            </div> -->
            
            <div class="contact-box">
            <h2>צור קשר</h2>
            <input class="name" type="text" placeholder="שם מלא" required>
            <input type="number" placeholder="טלפון" required>
            <input type="text" placeholder="שם העסק" required>
            <textarea rows="1" placeholder="הודעה" required></textarea>
            <button>שלח</button>
        </div>
        </div>
    </div>

</body>
</html>
