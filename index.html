<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="אתר תדמית נגיש בהתאם לתקן WCAG 2.1 AA">
  <title>דף הבית</title>

  <style>
    /* דילוג לתוכן – נגישות מקלדת */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 10px;
      background: #000;
      color: #fff;
      padding: 8px 12px;
      z-index: 1000;
      text-decoration: none;
    }
    .skip-link:focus {
      top: 10px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background-color: #ffffff;
      color: #000000;
    }

    header, main, footer {
      max-width: 1200px;
      margin: auto;
    }

    .hero {
      position: relative;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-text {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.85);
      padding: 15px;
      border-radius: 8px;
      max-width: 90%;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    a:focus,
    button:focus {
      outline: 3px solid #005fcc;
      outline-offset: 2px;
    }

    footer {
      padding: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<a href="#main-content" class="skip-link">דלג לתוכן הראשי</a>

<header>
  <div class="hero">
    <img src="background.jpeg"
         alt="תמונת רקע של האתר המשמשת כאלמנט עיצובי">
    <div class="hero-text">
      <h1>ברוכים הבאים</h1>
      <p>זהו אתר נגיש בהתאם לתקן WCAG 2.1 ברמה AA.</p>
    </div>
  </div>
</header>

<main id="main-content">
  <section aria-labelledby="about-title">
    <h2 id="about-title">אודות</h2>
    <p>
      האתר תוכנן להיות נגיש עבור אנשים עם מוגבלויות,
      כולל כבדי ראייה, משתמשי מקלדת וקוראי מסך.
    </p>
  </section>
</main>

<footer>
  <section aria-labelledby="accessibility-title">
    <h2 id="accessibility-title">הצהרת נגישות</h2>
    <p>
      אתר זה עומד בדרישות תקן הנגישות WCAG 2.1 ברמה AA.
      אם נתקלתם בבעיה, ניתן לפנות אל בעל האתר לקבלת סיוע.
    </p>
  </section>
</footer>

</body>
</html>
